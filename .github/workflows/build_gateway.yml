name: Gateway Build

on:
    workflow_dispatch:
      inputs:
        tag_name:
          description: 'GitHub release tag'
          required: true
    release:
      types: [published]

jobs:
  build_gateway_release:
    runs-on: ubuntu-latest
    steps:
        - name: Parse Release Name
          id: parse_release_name
          run: |
            release_name="${{ github.event.release.tag_name }}${{ github.event.inputs.tag_name }}"
            tag_pattern='^(stable|latest|beta)-[0-9]+[.][0-9]+[.][0-9]+[a-z]?$'
            if [[ "$release_name" == *$'\n'* ]] ||
               [[ "$release_name" == *$'\r'* ]] ||
               [[ ! "$release_name" =~ $tag_pattern ]]; then
              echo "Release tag must look like stable-10.45.1e, latest-10.45.1e, or beta-10.45.1e" >&2
              exit 1
            fi
            release_type="${release_name%%-*}"
            echo "Building Gateway $release_type for release: $release_name"
            echo "release_type=$release_type" >> "$GITHUB_OUTPUT"

            version="${release_name#*-}"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "Extracted version: $version"

            major_minor_version=$(echo "$version" | grep -oP '^\d+\.\d+')
            if [ -z "$major_minor_version" ]; then
              echo "Could not extract major/minor version from release tag: $release_name" >&2
              exit 1
            fi
            major_version="${version%%.*}"
            if [ -z "$major_version" ]; then
              echo "Could not extract major version from release tag: $release_name" >&2
              exit 1
            fi
            echo "Extracted major+minor version: $major_minor_version"
            echo "major_minor_version=$major_minor_version" >> "$GITHUB_OUTPUT"
            echo "Extracted major version: $major_version"
            echo "major_version=$major_version" >> "$GITHUB_OUTPUT"
          shell: bash

        - name: Checkout
          uses: actions/checkout@v4

        - name: Set up QEMU
          uses: docker/setup-qemu-action@v3

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Login to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

        - name: Build and push Gateway
          uses: docker/build-push-action@v5
          with:
            context: ./build
            platforms: linux/amd64,linux/arm64
            file: ./build/Dockerfile
            push: true
            build-args: |
                PROGRAM=ibgateway
                RELEASE=${{ steps.parse_release_name.outputs.release_type }}
                VERSION=${{ steps.parse_release_name.outputs.version }}
            tags: |
                ${{ secrets.DOCKERHUB_USERNAME }}/ib-gateway:${{ steps.parse_release_name.outputs.release_type }}
                ${{ secrets.DOCKERHUB_USERNAME }}/ib-gateway:${{ steps.parse_release_name.outputs.version }}
                ${{ steps.parse_release_name.outputs.release_type != 'beta' && format('{0}/ib-gateway:{1}', secrets.DOCKERHUB_USERNAME, steps.parse_release_name.outputs.major_minor_version) || '' }}
                ${{ steps.parse_release_name.outputs.release_type == 'latest' && format('{0}/ib-gateway:{1}', secrets.DOCKERHUB_USERNAME, steps.parse_release_name.outputs.major_version) || '' }}
