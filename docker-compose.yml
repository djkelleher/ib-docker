services:
  ib-gateway:
    image: danklabs/ib-gateway:stable
    build:
      context: ./build
      dockerfile: Dockerfile
      args:
        PROGRAM: ibgateway
        RELEASE: stable
        VERSION: "NULL"
        ARCH: x64
        IBC_VERSION: 3.23.0
    container_name: gateway
    restart: always
    network_mode: host
    environment:
      # VNC is disabled unless VNC_PWD is set in .env.
      VNC_PWD: ${VNC_PWD:-}
      VNC_PWD_FILE: ${VNC_PWD_FILE:-}
      VNC_PORT: ${VNC_PORT:-5900}
      VNC_SCREEN_DIMENSION: ${VNC_SCREEN_DIMENSION:-1600x1200x24}
      START_SCRIPTS: ${START_SCRIPTS:-}
      X_SCRIPTS: ${X_SCRIPTS:-}
      IBC_SCRIPTS: ${IBC_SCRIPTS:-}
      # live or paper.
      TRADING_MODE: ${TRADING_MODE:-paper}
      ACCEPT_NON_BROKERAGE_WARNING: ${ACCEPT_NON_BROKERAGE_WARNING:-yes}
      FIX: ${FIX:-no}
      FIX_LOGIN_ID: ${FIX_LOGIN_ID:-}
      FIX_PASSWORD: ${FIX_PASSWORD:-}
      SECOND_FACTOR_DEVICE: ${SECOND_FACTOR_DEVICE:-}
      SECOND_FACTOR_AUTH_TIMEOUT: ${SECOND_FACTOR_AUTH_TIMEOUT:-180}
      EXIT_AFTER_TWOFA_TIMEOUT: ${EXIT_AFTER_TWOFA_TIMEOUT:-no}
      LOGIN_DIALOG_DISPLAY_TIMEOUT: ${LOGIN_DIALOG_DISPLAY_TIMEOUT:-60}
      IB_DIR: ${IB_DIR:-}
      STORE_SETTINGS_ON_SERVER: ${STORE_SETTINGS_ON_SERVER:-yes}
      MINIMIZE_MAIN_WINDOW: ${MINIMIZE_MAIN_WINDOW:-no}
      EXISTING_SESSION_DETECTED_ACTION: ${EXISTING_SESSION_DETECTED_ACTION:-manual}
      OVERRIDE_TWS_API_PORT: ${OVERRIDE_TWS_API_PORT:-}
      OVERRIDE_TWS_MASTER_CLIENT_ID: ${OVERRIDE_TWS_MASTER_CLIENT_ID:-}
      READ_ONLY_LOGIN: ${READ_ONLY_LOGIN:-no}
      READ_ONLY_API: ${READ_ONLY_API:-no}
      TIME_ZONE: ${TIME_ZONE:-UTC}
      TWOFA_TIMEOUT_ACTION: ${TWOFA_TIMEOUT_ACTION:-exit}
      AUTO_RESTART_TIME: ${AUTO_RESTART_TIME:-}
      AUTO_LOGOFF_TIME: ${AUTO_LOGOFF_TIME:-}
      COLD_RESTART_TIME: ${COLD_RESTART_TIME:-}
      CLOSEDOWN_AT: ${CLOSEDOWN_AT:-}
      BYPASS_WARNING: ${BYPASS_WARNING:-yes}
      ACCEPT_BID_ASK_LAST_SIZE_DISPLAY_UPDATE: ${ACCEPT_BID_ASK_LAST_SIZE_DISPLAY_UPDATE:-}
      SEND_MARKET_DATA_IN_LOTS_FOR_US_STOCKS: ${SEND_MARKET_DATA_IN_LOTS_FOR_US_STOCKS:-}
      TRUSTED_TWS_API_CLIENT_IPS: ${TRUSTED_TWS_API_CLIENT_IPS:-}
      RESET_ORDER_IDS_AT_START: ${RESET_ORDER_IDS_AT_START:-}
      CONFIRM_ORDER_ID_RESET: ${CONFIRM_ORDER_ID_RESET:-}
      ACCEPT_INCOMING_CONNECTION_ACTION: ${ACCEPT_INCOMING_CONNECTION_ACTION:-manual}
      ALLOW_BLIND_TRADING: ${ALLOW_BLIND_TRADING:-no}
      SAVE_TWS_SETTINGS: ${SAVE_TWS_SETTINGS:-Every 30 mins}
      CONFIRM_CRYPTO_CURRENCY_ORDERS: ${CONFIRM_CRYPTO_CURRENCY_ORDERS:-manual}
      DISMISS_PASSWORD_EXPIRY_WARNING: ${DISMISS_PASSWORD_EXPIRY_WARNING:-no}
      DISMISS_NSE_COMPLIANCE_NOTICE: ${DISMISS_NSE_COMPLIANCE_NOTICE:-yes}
      INCLUDE_STACK_TRACE_FOR_EXCEPTIONS: ${INCLUDE_STACK_TRACE_FOR_EXCEPTIONS:-yes}
      COMMAND_SERVER_PORT: ${COMMAND_SERVER_PORT:-0}
      CONTROL_FROM: ${CONTROL_FROM:-}
      BIND_ADDRESS: ${BIND_ADDRESS:-}
      COMMAND_PROMPT: ${COMMAND_PROMPT:-}
      SUPPRESS_INFO_MESSAGES: ${SUPPRESS_INFO_MESSAGES:-yes}
      LOG_STRUCTURE_SCOPE: ${LOG_STRUCTURE_SCOPE:-known}
      LOG_STRUCTURE_WHEN: ${LOG_STRUCTURE_WHEN:-never}
      RELOGIN_AFTER_TWOFA_TIMEOUT: ${RELOGIN_AFTER_TWOFA_TIMEOUT:-no}
      TWOFA_EXIT_INTERVAL: ${TWOFA_EXIT_INTERVAL:-60}
      JAVA_HEAP_SIZE: ${JAVA_HEAP_SIZE:-}
      CUSTOM_JVM_OPTS: ${CUSTOM_JVM_OPTS:-}
      IB_USER: ${IB_USER:-}
      IB_USER_FILE: ${IB_USER_FILE:-}
      IB_PASSWORD: ${IB_PASSWORD:-}
      IB_PASSWORD_FILE: ${IB_PASSWORD_FILE:-}
  ib-tws:
    image: danklabs/ib-tws:stable
    build:
      context: ./build
      dockerfile: Dockerfile
      args:
        PROGRAM: tws
        RELEASE: stable
        VERSION: "NULL"
        ARCH: x64
        IBC_VERSION: 3.23.0
    container_name: tws
    restart: always
    network_mode: host
    security_opt:
      - seccomp:unconfined
    shm_size: 2g
    environment:
      # VNC is disabled unless VNC_PWD is set in .env.
      VNC_PWD: ${VNC_PWD:-}
      VNC_PWD_FILE: ${VNC_PWD_FILE:-}
      VNC_PORT: ${TWS_VNC_PORT:-5901}
      VNC_SCREEN_DIMENSION: ${VNC_SCREEN_DIMENSION:-1600x1200x24}
      START_SCRIPTS: ${START_SCRIPTS:-}
      X_SCRIPTS: ${X_SCRIPTS:-}
      IBC_SCRIPTS: ${IBC_SCRIPTS:-}
      # live or paper.
      TRADING_MODE: ${TRADING_MODE:-paper}
      ACCEPT_NON_BROKERAGE_WARNING: ${ACCEPT_NON_BROKERAGE_WARNING:-yes}
      FIX: ${FIX:-no}
      FIX_LOGIN_ID: ${FIX_LOGIN_ID:-}
      FIX_PASSWORD: ${FIX_PASSWORD:-}
      SECOND_FACTOR_DEVICE: ${SECOND_FACTOR_DEVICE:-}
      SECOND_FACTOR_AUTH_TIMEOUT: ${SECOND_FACTOR_AUTH_TIMEOUT:-180}
      EXIT_AFTER_TWOFA_TIMEOUT: ${EXIT_AFTER_TWOFA_TIMEOUT:-no}
      LOGIN_DIALOG_DISPLAY_TIMEOUT: ${LOGIN_DIALOG_DISPLAY_TIMEOUT:-60}
      IB_DIR: ${IB_DIR:-}
      STORE_SETTINGS_ON_SERVER: ${STORE_SETTINGS_ON_SERVER:-yes}
      MINIMIZE_MAIN_WINDOW: ${MINIMIZE_MAIN_WINDOW:-no}
      EXISTING_SESSION_DETECTED_ACTION: ${EXISTING_SESSION_DETECTED_ACTION:-manual}
      OVERRIDE_TWS_API_PORT: ${OVERRIDE_TWS_API_PORT:-}
      OVERRIDE_TWS_MASTER_CLIENT_ID: ${OVERRIDE_TWS_MASTER_CLIENT_ID:-}
      READ_ONLY_LOGIN: ${READ_ONLY_LOGIN:-no}
      READ_ONLY_API: ${READ_ONLY_API:-no}
      TIME_ZONE: ${TIME_ZONE:-UTC}
      TWOFA_TIMEOUT_ACTION: ${TWOFA_TIMEOUT_ACTION:-exit}
      AUTO_RESTART_TIME: ${AUTO_RESTART_TIME:-}
      AUTO_LOGOFF_TIME: ${AUTO_LOGOFF_TIME:-}
      COLD_RESTART_TIME: ${COLD_RESTART_TIME:-}
      CLOSEDOWN_AT: ${CLOSEDOWN_AT:-}
      BYPASS_WARNING: ${BYPASS_WARNING:-yes}
      ACCEPT_BID_ASK_LAST_SIZE_DISPLAY_UPDATE: ${ACCEPT_BID_ASK_LAST_SIZE_DISPLAY_UPDATE:-}
      SEND_MARKET_DATA_IN_LOTS_FOR_US_STOCKS: ${SEND_MARKET_DATA_IN_LOTS_FOR_US_STOCKS:-}
      TRUSTED_TWS_API_CLIENT_IPS: ${TRUSTED_TWS_API_CLIENT_IPS:-}
      RESET_ORDER_IDS_AT_START: ${RESET_ORDER_IDS_AT_START:-}
      CONFIRM_ORDER_ID_RESET: ${CONFIRM_ORDER_ID_RESET:-}
      ACCEPT_INCOMING_CONNECTION_ACTION: ${ACCEPT_INCOMING_CONNECTION_ACTION:-manual}
      ALLOW_BLIND_TRADING: ${ALLOW_BLIND_TRADING:-no}
      SAVE_TWS_SETTINGS: ${SAVE_TWS_SETTINGS:-Every 30 mins}
      CONFIRM_CRYPTO_CURRENCY_ORDERS: ${CONFIRM_CRYPTO_CURRENCY_ORDERS:-manual}
      DISMISS_PASSWORD_EXPIRY_WARNING: ${DISMISS_PASSWORD_EXPIRY_WARNING:-no}
      DISMISS_NSE_COMPLIANCE_NOTICE: ${DISMISS_NSE_COMPLIANCE_NOTICE:-yes}
      INCLUDE_STACK_TRACE_FOR_EXCEPTIONS: ${INCLUDE_STACK_TRACE_FOR_EXCEPTIONS:-yes}
      COMMAND_SERVER_PORT: ${COMMAND_SERVER_PORT:-0}
      CONTROL_FROM: ${CONTROL_FROM:-}
      BIND_ADDRESS: ${BIND_ADDRESS:-}
      COMMAND_PROMPT: ${COMMAND_PROMPT:-}
      SUPPRESS_INFO_MESSAGES: ${SUPPRESS_INFO_MESSAGES:-yes}
      LOG_STRUCTURE_SCOPE: ${LOG_STRUCTURE_SCOPE:-known}
      LOG_STRUCTURE_WHEN: ${LOG_STRUCTURE_WHEN:-never}
      RELOGIN_AFTER_TWOFA_TIMEOUT: ${RELOGIN_AFTER_TWOFA_TIMEOUT:-no}
      TWOFA_EXIT_INTERVAL: ${TWOFA_EXIT_INTERVAL:-60}
      JAVA_HEAP_SIZE: ${JAVA_HEAP_SIZE:-}
      CUSTOM_JVM_OPTS: ${CUSTOM_JVM_OPTS:-}
      IB_USER: ${IB_USER:-}
      IB_USER_FILE: ${IB_USER_FILE:-}
      IB_PASSWORD: ${IB_PASSWORD:-}
      IB_PASSWORD_FILE: ${IB_PASSWORD_FILE:-}
